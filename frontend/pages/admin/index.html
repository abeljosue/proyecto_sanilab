<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <title>Panel Admin</title>
  <link rel="stylesheet" href="../../assets/css/admin.css">
  <link rel="icon" type="image/png" href="../../assets/images/Sanilab-favicon.png" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
</head>

<body>
  <div class="container">
    <a href="/pages/home/index.html" class="back-link">← Volver</a>
    <h1>Panel Administrativo</h1>

    <div class="filters">
      <input type="search" id="buscarNombre" placeholder="Buscar por persona..." autocomplete="off">
      <input type="date" id="fechaDesde" title="Fecha de inicio (Desde)">
      <input type="date" id="fechaHasta" title="Fecha límite (Hasta)">
      <button id="btnFiltrarHoras">Filtrar horas</button>
      <button id="btnFiltrarPuntajes">Filtrar puntajes</button>
      <button id="btnExportarSheets" class="btn-export-sheets">📊 Exportar a Google Sheets</button>
    </div>

    <div style="margin-bottom: 30px;">
      <button id="btnVerFaltantes" class="btn-faltantes">
        📋 Ver quiénes no han marcado entrada hoy
      </button>
    </div>

    <div id="faltantesContainer" style="display: none;">
      <h2 id="tituloFaltantes">Faltantes del día</h2>
      <table class="table">
        <thead>
          <tr>

            <th>Nombre</th>
            <th>Apellido</th>
            <th>Correo</th>
            <th>Área</th>
          </tr>
        </thead>
        <tbody id="tablaFaltantes"></tbody>
      </table>
    </div>

    <h2>Horas contabilizadas</h2>
    <table class="table">
      <thead>
        <tr>
          <th>Nombre</th>
          <th>Area </th>
          <th>Estado</th>
          <th>Fecha</th>
          <th>Hora Entrada</th>
          <th>Hora Salida</th>
          <th>Horas Totales</th>
          <th>Acciones</th>
        </tr>
      </thead>
      <tbody id="tablaHoras"></tbody>
    </table>

    <h2>Puntajes de autoevaluación</h2>
    <table class="table">
      <thead>
        <tr>
          <th>Nombre</th>
          <th>Quincena</th>
          <th>Puntaje total</th>
          <th>Puesto</th>
        </tr>
      </thead>
      <tbody id="tablaPuntajes"></tbody>
    </table>
  </div>
  <!-- MODAL PARA EDITAR HORAS -->
  <div id="modalEditarHoras"
    style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); z-index:1000; justify-content:center; align-items:center;">
    <div style="background:white; padding:20px; border-radius:8px; width:350px; color:black; font-family:sans-serif;">
      <h3 style="margin-top:0;">Editar Asistencia</h3>
      <p id="modalEditNombre" style="font-weight:bold;"></p>

      <label style="display:block; margin-bottom:5px;">Hora de Entrada (HH:mm)</label>
      <input type="time" id="inputEditEntrada"
        style="width:100%; padding:8px; margin-bottom:15px; border:1px solid #ccc; border-radius:4px;">

      <label style="display:block; margin-bottom:5px;">Hora de Salida (HH:mm)</label>
      <input type="time" id="inputEditSalida"
        style="width:100%; padding:8px; margin-bottom:15px; border:1px solid #ccc; border-radius:4px;">

      <div style="display:flex; justify-content:flex-end; gap:10px;">
        <button id="btnCerrarModal"
          style="padding:8px 15px; border:none; background:#ccc; cursor:pointer; border-radius:4px;">Cancelar</button>
        <button id="btnGuardarEdicion"
          style="padding:8px 15px; border:none; background:#007bff; color:white; cursor:pointer; border-radius:4px;">Guardar
          Cambios</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <script src="../../js/pages/admin.js"></script>
</body>

</html>
