<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sanilab | Registro</title>
  <link rel="stylesheet" href="../../assets/css/auth.css" />
  <link rel="icon" type="image/png" href="../../assets/images/Sanilab-favicon.png" />
</head>

<body>
  <div class="background"></div>

  <main class="auth-container">
    <div class="auth-card">
      <img src="../../assets/images/Sanilab-logo.png" alt="Sanilab Logo" class="auth-logo" />

      <h1 class="auth-title"><strong>Registro</strong></h1>
      <p class="auth-description">
        Crea tu cuenta para acceder a la plataforma de autoevaluaciones.
      </p>

      <form id="registroForm" autocomplete="off">
        <label for="nombre"><strong>Nombre</strong></label>
        <input type="text" id="nombre" name="nombre" required />

        <label for="apellido"><strong>Apellido</strong></label>
        <input type="text" id="apellido" name="apellido" required />



        <label for="correo"><strong>Correo electrónico</strong></label>
        <input type="email" id="correo" name="correo" required />

        <label for="password"><strong>Contraseña</strong></label>
        <div class="password-wrapper">
          <input type="password" id="password" name="password" required />
          <button type="button" class="toggle-password" onclick="togglePassword('password', this)"
            aria-label="Mostrar contraseña">
            👁
          </button>
        </div>

        <label for="confirmPassword"><strong>Confirmar contraseña</strong></label>
        <div class="password-wrapper">
          <input type="password" id="confirmPassword" name="confirmPassword" required />
          <button type="button" class="toggle-password" onclick="togglePassword('confirmPassword', this)"
            aria-label="Mostrar contraseña">
            👁
          </button>
        </div>
        <div id="passwordMsg" class="helper"></div>

        <label for="area"><strong>Área</strong></label>
        <select id="area" name="area" required>
          <option value="" selected disabled>Selecciona un área</option>
        </select>

        <label for="cumpleanos"><strong>Fecha de Nacimiento</strong></label>
        <input type="date" id="cumpleanos" name="cumpleanos" required />

        <label><strong>Género</strong></label>
        <div class="radio-group">
          <label class="radio-option">
            <input type="radio" name="genero" class="generos" value="M" required />
            Hombre
          </label>

          <label class="radio-option">
            <input type="radio" name="genero" class="generos" value="F" required />
            Mujer
          </label>
        </div>

        <button type="submit">Registrarse</button>
      </form>

      <div class="links">
        <p>¿Ya tienes cuenta? <a href="../../index.html">Iniciar sesión</a></p>
      </div>

      <small class="security">Tus datos están protegidos y no se comparten.</small>
    </div>
  </main>

  <div id="modal-exito" class="modal-overlay oculto">
    <div class="modal-card">
      <div class="modal-icon">✓</div>
      <h2>Usuario registrado correctamente</h2>
      <p>Tu cuenta se creó con éxito. Ahora puedes iniciar sesión en el sistema Sanilab.</p>
      <button id="btn-ir-login">Ir a iniciar sesión</button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <script src="../../js/auth.js"></script>
  <script src="../../js/pages/registro.js"></script>
</body>

</html>
